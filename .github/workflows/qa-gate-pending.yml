name: QA Gate - Seed Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  checks: write

jobs:
  seed-check:
    runs-on: ubuntu-latest
    steps:
      - name: Create/reset qa-release-gate check run as queued
        uses: actions/github-script@v7
        with:
          script: |
            // Find-or-update: checks.create() always makes a brand-new
            // check-run object, even for a head_sha that already has one -
            // repeated calls orphan earlier objects stuck in whatever
            // status they were left in (they never appear "resolved").
            // Look for an existing run for this exact head_sha first.
            const { owner, repo } = context.repo;
            const head_sha = context.payload.pull_request.head.sha;
            const { data } = await github.rest.checks.listForRef({
              owner, repo, ref: head_sha, check_name: 'qa-release-gate',
            });
            const existing = data.check_runs.sort((a, b) => b.id - a.id)[0];
            const fields = {
              status: 'queued',
              output: {
                title: 'AI QA gate not yet run',
                summary: 'Comment `/qa` on this PR to run the AI QA release gate (Playwright-driven smoke test + static gates). This check blocks merge until it reports success.'
              }
            };
            if (existing) {
              await github.rest.checks.update({ owner, repo, check_run_id: existing.id, ...fields });
            } else {
              await github.rest.checks.create({ owner, repo, name: 'qa-release-gate', head_sha, ...fields });
            }
