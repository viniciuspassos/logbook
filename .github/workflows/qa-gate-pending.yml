name: QA Gate - Seed Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  checks: write

jobs:
  seed-check:
    runs-on: ubuntu-latest
    steps:
      - name: Create/reset qa-release-gate check run as queued
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'qa-release-gate',
              head_sha: context.payload.pull_request.head.sha,
              status: 'queued',
              output: {
                title: 'AI QA gate not yet run',
                summary: 'Comment `/qa` on this PR to run the AI QA release gate (Playwright-driven smoke test + static gates). This check blocks merge until it reports success.'
              }
            });
