name: Cleanup - Resolve orphaned check-runs

on:
  workflow_dispatch:
    inputs:
      check_run_ids:
        description: Comma-separated check-run IDs to mark completed/cancelled
        required: true
        type: string

permissions:
  checks: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve each check-run
        uses: actions/github-script@v7
        env:
          CHECK_RUN_IDS: ${{ inputs.check_run_ids }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const ids = process.env.CHECK_RUN_IDS.split(',').map(s => s.trim()).filter(Boolean);
            for (const id of ids) {
              await github.rest.checks.update({
                owner, repo,
                check_run_id: Number(id),
                status: 'completed',
                conclusion: 'cancelled',
                output: {
                  title: 'Superseded',
                  summary: 'Orphaned by a since-fixed bug (checks.create() instead of checks.update()) - manually resolved via the cleanup-checks workflow.'
                }
              });
              console.log(`Resolved check-run ${id}`);
            }
