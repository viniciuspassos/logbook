name: CI - Static Gates

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ci-static-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  static-gates:
    name: static-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Run pre-commit gate (typecheck, lint, test)
        run: |
          chmod +x .githooks/pre-commit
          ./.githooks/pre-commit

      - name: Production build
        run: npm run build
