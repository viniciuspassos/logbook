# Optional local infra for logbook-server (server/), the standalone backend
# that adds entry persistence (Postgres) and file/photo uploads.
#
# This compose file is entirely opt-in. The frontend (npm run dev / build /
# test / preview at the repo root) never depends on Docker, Postgres, or this
# backend being present or running — see docs/INFRASTRUCTURE.md and
# CLAUDE.md's "AI unavailability must never block entry creation" rule, which
# the same philosophy extends to here: no backend, no problem, for the app
# that matters to a mountaineer/skydiver with zero connectivity.
#
# Usage:
#   docker compose up --build      # start db + backend
#   docker compose down            # stop (named volumes persist)
#   docker compose down -v         # stop and wipe db/upload data too
#
# There is no migration mechanism yet (see server/src/database/typeorm.config.ts);
# `synchronize` auto-syncs the schema from entities outside NODE_ENV=production.

services:
  db:
    image: postgres:16.4-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: logbook
      POSTGRES_PASSWORD: logbook
      POSTGRES_DB: logbook
    volumes:
      - logbook-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logbook -d logbook"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "3000"
      NODE_ENV: development
      DATABASE_URL: postgres://logbook:logbook@db:5432/logbook
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_BYTES: "10485760"
    volumes:
      # Named volume so uploaded files survive container restarts/recreation
      # (server/.env.example flags the bare default `./uploads` as non-durable).
      - logbook-uploads:/app/uploads
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  logbook-db-data:
  logbook-uploads:
