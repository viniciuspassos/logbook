# Optional local infra for logbook-server (server/), the standalone backend
# that adds entry persistence (Postgres) and file/photo uploads.
#
# This compose file is entirely opt-in. The frontend (npm run dev / build /
# test / preview at the repo root) never depends on Docker, Postgres, or this
# backend being present or running — see docs/INFRASTRUCTURE.md and
# CLAUDE.md's "AI unavailability must never block entry creation" rule, which
# the same philosophy extends to here: no backend, no problem, for the app
# that matters to a mountaineer/skydiver with zero connectivity.
#
# Usage:
#   docker compose up --build      # start db + backend
#   docker compose down            # stop (named volumes persist)
#   docker compose down -v         # stop and wipe db/upload data too
#
# Schema is created by TypeORM migrations (see server/src/database/), which run
# automatically the moment the backend connects (`migrationsRun: true` in
# server/src/database/typeorm.config.ts) — nothing to run by hand for
# `docker compose up` to work against a fresh `db` volume.

services:
  db:
    image: postgres:16.4-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: logbook
      POSTGRES_PASSWORD: logbook
      POSTGRES_DB: logbook
    volumes:
      - logbook-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logbook -d logbook"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "3000"
      NODE_ENV: development
      DATABASE_URL: postgres://logbook:logbook@db:5432/logbook
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_BYTES: "10485760"
      # Dev-only default credential, committed here the same way the
      # Postgres user/password above are — this is local/opt-in infra only,
      # not a hosted deployment (see the file header). Hashes the password
      # "logbook-dev-password"; log in locally with that. Generate your own
      # with `npm run hash-password -- "<password>"` for anything beyond
      # throwaway local use, and override this var rather than editing it
      # in place if you do.
      # `$$` escapes a literal `$` — Compose interpolates single `$` as a
      # shell-style variable reference, which would otherwise mangle this
      # `$`-delimited hash format (see src/auth/password-hasher.service.ts).
      AUTH_PASSWORD_HASH: "scrypt$$16384$$02e6cd9dd6b706bead3e739e83d73e71$$6b74546315b091b7565f7d9029a90846810970100d632e700e6cdb40261b4de7997457fefdb3d1765b8c269bf05bece95f5d19c78af4597683f4db2c9362ae23"
    volumes:
      # Named volume so uploaded files survive container restarts/recreation
      # (server/.env.example flags the bare default `./uploads` as non-durable).
      - logbook-uploads:/app/uploads
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  logbook-db-data:
  logbook-uploads:
